<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sfondo trasparente implicito -->
  <!-- Quadrato principale -->
  <rect x="64" y="64" width="280" height="280" rx="60" fill="url(#grad1)" opacity="0.9" />
  <!-- Quadrato sovrapposto -->
  <rect x="168" y="168" width="280" height="280" rx="60" fill="url(#grad2)" opacity="0.95" />
  <!-- Dettaglio interno per simulare la generazione di un'icona -->
  <rect x="238" y="238" width="140" height="140" rx="30" fill="white" />
</svg>
